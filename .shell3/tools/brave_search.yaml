name: brave_search
description: Search the web using Brave Search API and return concise results.
enabled: true
secrets: [BRAVE_API_KEY]
parameters:
  type: object
  properties:
    query:
      type: string
      description: Search query
    count:
      type: integer
      description: Number of results to return (1-20)
      minimum: 1
      maximum: 20
    offset:
      type: integer
      description: Pagination offset
      minimum: 0
  required: [query]
command: |
  q="$QUERY"
  c="${COUNT:-10}"
  o="${OFFSET:-0}"

  curl -sS --get 'https://api.search.brave.com/res/v1/web/search' \
    -H "Accept: application/json" \
    -H "X-Subscription-Token: $BRAVE_API_KEY" \
    --data-urlencode "q=$q" \
    --data-urlencode "count=$c" \
    --data-urlencode "offset=$o" \
  | jq -r '
      if (.web? and .web.results?) then
        .web.results[]
        | "- " + (.title // "(no title)") + "\\n  " + (.url // "") + "\\n  " + (.description // "") + "\\n"
      elif .error? then
        "Brave API error: " + (.error.code // "unknown") + " - " + (.error.message // "")
      else
        "No results."
      end
    '
timeout: 20s
