<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shell3 webui</title>
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
         max-width: 820px; margin: 0 auto; padding: 1rem 1rem 5rem;
         background: #0b0e14; color: #cdd6f4; }
  h3 { color: #89b4fa; }
  #log > div { white-space: pre-wrap; word-break: break-word; }
  .user      { color: #89b4fa; margin-top: 1.2rem; font-weight: 600; }
  .assistant { color: #cdd6f4; }
  .reasoning { color: #6c7086; font-style: italic; }
  .tool      { color: #a6e3a1; margin-top: .3rem; }
  .toolout   { color: #7f849c; border-left: 2px solid #313244; padding-left: .6rem; }
  .retry     { color: #f9e2af; }
  .error     { color: #f38ba8; }
  .meta      { color: #585b70; font-size: 12px; margin-bottom: .3rem; }
  form { display: flex; gap: .5rem; position: fixed; bottom: 0; left: 0; right: 0;
         max-width: 820px; margin: 0 auto; padding: .75rem 1rem;
         background: #0b0e14; border-top: 1px solid #313244; }
  input { flex: 1; padding: .55rem .7rem; background: #1e1e2e; color: #cdd6f4;
          border: 1px solid #313244; border-radius: 6px; outline: none; }
  input:focus { border-color: #89b4fa; }
  button { padding: .55rem 1.1rem; background: #89b4fa; color: #0b0e14;
           border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<h3>shell3 webui</h3>
<div id="log"></div>
<form id="f">
  <input id="msg" autocomplete="off" autofocus placeholder="message the agent…">
  <button id="send">send</button>
</form>
<script>
  const log = document.getElementById('log');
  const form = document.getElementById('f');
  const input = document.getElementById('msg');
  const sendBtn = document.getElementById('send');

  function line(cls, text) {
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = text;
    log.appendChild(d);
    window.scrollTo(0, document.body.scrollHeight);
    return d;
  }

  function setBusy(b) { sendBtn.disabled = b; }

  form.onsubmit = (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg || sendBtn.disabled) return;
    input.value = '';
    setBusy(true);
    line('user', '› ' + msg);

    let assistant = null;   // current assistant bubble (built from token events)
    let reasoning = null;   // current thinking bubble

    const es = new EventSource('/send?msg=' + encodeURIComponent(msg));

    const finish = (note) => { es.close(); setBusy(false); if (note) line('meta', note); input.focus(); };

    es.onmessage = (m) => {
      const ev = JSON.parse(m.data);
      switch (ev.kind) {
        case 'token':
          if (!assistant) assistant = line('assistant', '');
          assistant.textContent += ev.text || '';
          window.scrollTo(0, document.body.scrollHeight);
          break;
        case 'reasoning':
          if (!reasoning) reasoning = line('reasoning', '◆ ');
          reasoning.textContent += ev.text || '';
          break;
        case 'toolCall':
          reasoning = null;
          line('tool', '⚙ ' + ev.toolName + (ev.toolInput ? ' ' + ev.toolInput : ''));
          break;
        case 'toolResult':
          line('toolout', (ev.toolOutput || '').slice(0, 4000));
          assistant = null; // a fresh assistant bubble follows the tool result
          break;
        case 'retry':
          line('retry', '↻ ' + (ev.text || ''));
          break;
        case 'error':
          line('error', '✖ ' + (ev.err || 'error'));
          finish(null); // error is terminal — close so EventSource won't reconnect
          break;
        case 'done':
          finish('— done' + (ev.totalTokens ? ' (' + ev.totalTokens + ' tokens)' : ''));
          break;
      }
    };

    // Fires on genuine stream drop. close() here prevents EventSource's default
    // auto-reconnect (which would re-run the same turn).
    es.onerror = () => { if (sendBtn.disabled) finish('— connection closed'); };
  };
</script>
</body>
</html>
