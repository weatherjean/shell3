name: web_fetch
description: |
  Fetch a web page by URL, extract readable text, and list links.
  Use this whenever you need to read web content instead of guessing.
  Pass max_chars to control output length (default 12000).
enabled: true
parameters:
  type: object
  properties:
    url:
      type: string
      description: The full URL to fetch (including https://)
    max_chars:
      type: integer
      description: Maximum characters of text to return (default 12000)
      default: 12000
  required: [url]
command: |
  curl -sL -H 'User-Agent: Mozilla/5.0' "$URL" | python3 -c "
  import sys, re
  max_chars = int('$MAX_CHARS') if '$MAX_CHARS' else 12000
  html = sys.stdin.read()
  html = re.sub(r'<script[^>]*>.*?</script>', '', html, flags=re.DOTALL)
  html = re.sub(r'<style[^>]*>.*?</style>', '', html, flags=re.DOTALL)
  links = re.findall(r'href=[\"\x27]([^\"\x27\s]+)[\"\x27]', html)
  text = re.sub(r'<[^>]+>', ' ', html)
  text = re.sub(r'\s+', ' ', text).strip()
  if links:
      print('--- LINKS ---')
      for link in links:
          if link.startswith('http') or link.startswith('/'):
              print(link)
      print('--- END LINKS ---')
      print()
  print(text[:max_chars])
  "
timeout: 30s
