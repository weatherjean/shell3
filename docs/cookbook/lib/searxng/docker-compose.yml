# Ready-to-go local SearXNG for shell3 — JSON API on, bot-limiter off,
# bound to localhost only. Copy this dir to ~/.shell3/lib/searxng/, then:
#   echo "SEARXNG_SECRET=$(openssl rand -hex 32)" > .env
#   docker compose up -d
services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng
    environment:
      - "SEARXNG_SECRET=${SEARXNG_SECRET:?missing -- create .env first, see header comment}"

volumes:
  searxng-data:
