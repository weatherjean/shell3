# Ready-to-go local SearXNG for shell3 — JSON API on, bot-limiter off,
# bound to localhost only. Copy this dir to ~/.shell3/lib/searxng/, then:
#   echo "SEARXNG_SECRET=$(openssl rand -hex 32)" > .env
#   docker compose up -d
#
# Durability: `restart: unless-stopped` survives crashes and daemon
# restarts (make sure docker itself starts on boot: Docker Desktop /
# OrbStack login item on macOS, `systemctl enable docker` on Linux).
# Engine/cache state lives in the named volume; config + secret live on
# the host, so `docker compose down && up -d` is always safe. SearXNG is
# otherwise stateless — no database needed (valkey only matters if you
# turn the limiter on).
services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:47821:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng
    environment:
      - "SEARXNG_SECRET=${SEARXNG_SECRET:?missing -- create .env first, see header comment}"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "2"

volumes:
  searxng-data:
