<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shell3 — sign in</title>
  <style>
    /* Palette + type mirror the chat UI (assets/index.html). */
    :root {
      color-scheme: dark;
      --bg: #16161e; --panel: #1a1b26; --bar: #1f2030;
      --fg: #a9b1d6; --dim: #7e88b3; --gold: #e0af68; --red: #f7768e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
           font: 13.5px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
           display: flex; align-items: center; justify-content: center; }
    form { background: var(--panel); border: 1px solid #2a2b3d; border-radius: 8px;
           padding: 24px; width: 300px; }
    .title { color: var(--gold); font-weight: 700; font-size: 1.25em; }
    .tagline { color: var(--dim); margin: 2px 0 18px; }
    label { display: block; color: var(--gold); margin-bottom: 6px; }
    input { width: 100%; background: var(--bg); color: var(--fg); border: 1px solid #2a2b3d;
            border-radius: 6px; padding: 8px 10px; font: inherit; line-height: 1.5; outline: none; }
    input:focus { border-color: var(--gold); }
    button { width: 100%; margin-top: 14px; background: var(--gold); color: #16161e;
             border: 1px solid var(--gold); border-radius: 6px; padding: 8px 12px;
             font: inherit; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    .err { color: var(--red); margin: 12px 0 0; display: none; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <div class="title">shell3</div>
    <div class="tagline">sign in to continue</div>
    <label for="pw">password</label>
    <input id="pw" type="password" name="password" autofocus autocomplete="current-password">
    <p class="err" id="err">Incorrect password.</p>
    <button type="submit">Sign in</button>
  </form>
  <script>
    if (location.search.indexOf('e=1') >= 0) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
