<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>shell3</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Syntax highlighting for the Files viewer. Vendored (see static/vendor/highlight/NOTICE.md)
     so the dashboard has no third-party runtime dependency. Falls back to plain text if absent. -->
<script src="/static/vendor/highlight/highlight.min.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #fff);
    --text: var(--tg-theme-text-color, #1a1a1a);
    --hint: var(--tg-theme-hint-color, #8b97a3);
    --link: var(--tg-theme-link-color, #2b8ef0);
    --sec: var(--tg-theme-secondary-bg-color, #f1f3f5);
    --btn: var(--tg-theme-button-color, #2b8ef0);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --radius: 14px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column;
    font: 15px/1.45 -apple-system, system-ui, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    overscroll-behavior: none;
  }

  /* Tab bar */
  nav {
    display: flex; gap: 2px; padding: 8px 8px 0;
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  nav button {
    flex: 1; appearance: none; border: 0; cursor: pointer;
    background: transparent; color: var(--hint);
    font: inherit; font-weight: 600; font-size: 13px;
    padding: 10px 4px 12px; border-radius: 10px 10px 0 0;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav button.active { color: var(--text); border-bottom-color: var(--btn); }

  /* Scrollable view area */
  main { flex: 1; overflow-y: auto; padding: 10px 10px 24px; -webkit-overflow-scrolling: touch; }
  .view { display: none; }
  .view.active { display: block; }

  .empty { color: var(--hint); text-align: center; padding: 40px 16px; font-size: 14px; }

  /* Chat bubbles */
  .msg { margin: 8px 0; display: flex; }
  .msg .bubble {
    max-width: 84%; padding: 8px 12px; border-radius: var(--radius);
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: var(--btn); color: var(--btn-text); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--sec); border-bottom-left-radius: 4px; }
  .msg.system .bubble { background: transparent; color: var(--hint); font-size: 13px; font-style: italic; padding: 4px 8px; }

  /* Tool calls — collapsible */
  details.tool {
    margin: 6px 0; background: var(--sec); border-radius: 10px;
    border: 1px solid color-mix(in srgb, var(--hint) 22%, transparent);
    overflow: hidden;
  }
  details.tool > summary {
    cursor: pointer; list-style: none; padding: 8px 12px;
    font-family: var(--mono); font-size: 12.5px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  details.tool > summary::-webkit-details-marker { display: none; }
  details.tool > summary .chev { color: var(--hint); transition: transform .15s; }
  details.tool[open] > summary .chev { transform: rotate(90deg); }
  details.tool > summary .tname { font-weight: 700; }
  details.tool pre {
    margin: 0; padding: 10px 12px; font-family: var(--mono); font-size: 12px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
    border-top: 1px solid color-mix(in srgb, var(--hint) 18%, transparent);
    color: var(--text);
    /* Grow to fit — never an inner scrollbar; the page scrolls instead. */
  }

  /* Subagent cards */
  .card {
    background: var(--sec); border-radius: 12px; padding: 12px 14px; margin: 8px 0;
  }
  .card .row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .card .agent { font-weight: 700; }
  .card .task { color: var(--text); font-size: 14px; }
  .card .preview { margin-top: 8px; font-family: var(--mono); font-size: 12px; color: var(--hint); white-space: pre-wrap; }
  details.card > summary { list-style: none; cursor: pointer; }
  details.card > summary::-webkit-details-marker { display: none; }
  .card.sess, .card.run, .card.cronjob { cursor: pointer; }
  pre.prompt {
    margin: 0; padding: 12px 14px; background: var(--sec); border-radius: 12px;
    font-family: var(--mono); font-size: 13px; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
  }
  .subbody { margin-top: 10px; border-top: 1px solid color-mix(in srgb, var(--hint) 18%, transparent); padding-top: 8px; }
  .back { appearance: none; border: 0; background: var(--sec); color: var(--text); font: inherit; font-weight: 600;
    padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
  .usage { display: flex; gap: 8px; margin: 6px 0 8px; }
  .usage .u { flex: 1; background: var(--sec); border-radius: 10px; padding: 8px; text-align: center; }
  .usage .u .n { font-weight: 700; font-size: 16px; display: block; }
  .usage .u .l { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: .04em; }
  .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; text-transform: uppercase; letter-spacing: .03em; }
  .badge.running { background: #f5a623; color: #1a1a1a; }
  .badge.finished { background: #34c759; color: #06280f; }

  /* Status view */
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 6px 14px; margin: 6px 0 16px; }
  .kv dt { color: var(--hint); font-size: 13px; }
  .kv dd { margin: 0; font-weight: 600; word-break: break-word; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--hint); margin: 16px 0 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--sec); border-radius: 8px; padding: 4px 10px; font-size: 13px; font-family: var(--mono); }
  .param { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--sec); font-size: 14px; }
  .param .pname { color: var(--hint); }
  .param .pval { font-family: var(--mono); font-weight: 600; }

  details.tool.think { background: transparent; border-style: dashed; }
  details.tool.think > summary { color: var(--hint); }
  .tlabel { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--hint);
    padding: 8px 12px 0; font-family: var(--mono); }
  .tlabel + pre { padding-top: 4px; border-top: 0; }
  .def { font-size: 10px; color: var(--hint); font-weight: 600; margin-left: 6px; text-transform: uppercase; }

  .crumb { font-family: var(--mono); font-size: 12.5px; color: var(--hint); padding: 4px 2px 10px; word-break: break-all; }

  .err { color: #e0392b; text-align: center; padding: 30px; }
</style>
</head>
<body>
<nav>
  <button data-tab="chat" class="active">Chat</button>
  <button data-tab="runs">Runs</button>
  <button data-tab="cron">Cron</button>
  <button data-tab="files">Files</button>
  <button data-tab="status">Status</button>
</nav>
<main>
  <section id="chat" class="view active"><div class="empty">loading…</div></section>
  <section id="runs" class="view"><div class="empty">loading…</div></section>
  <section id="cron" class="view"><div class="empty">loading…</div></section>
  <section id="files" class="view"><div class="empty">loading…</div></section>
  <section id="status" class="view"><div class="empty">loading…</div></section>
</main>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const initData = (tg && tg.initData) || "";

// All API calls carry the Telegram initData for auth.
async function api(path) {
  const r = await fetch(path, { headers: { "X-Init-Data": initData } });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
const esc = s => (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

// Syntax highlighting (Files viewer). Load the vendored hljs theme matching
// Telegram's color scheme; token colors apply globally so we keep the panel's bg.
(function () {
  const dark = !tg || tg.colorScheme === "dark";
  const l = document.createElement("link");
  l.rel = "stylesheet";
  l.href = "/static/vendor/highlight/" + (dark ? "github-dark" : "github") + ".min.css";
  document.head.appendChild(l);
})();
// Map file extensions to hljs language ids. Anything unmapped renders as plain
// text. Covers the config-folder file types worth highlighting.
const EXT_LANG = {
  lua: "lua", md: "markdown", markdown: "markdown",
  py: "python", js: "javascript", mjs: "javascript", cjs: "javascript",
  jsx: "javascript", ts: "typescript", tsx: "typescript",
  json: "json", yaml: "yaml", yml: "yaml", toml: "ini", sh: "bash", bash: "bash",
};
const langOf = name => EXT_LANG[(name.slice(name.lastIndexOf(".") + 1) || "").toLowerCase()] || "";
// Returns highlighted HTML for known languages, else plain escaped text. Falls
// back to escaping if hljs failed to load (offline) or throws.
function highlight(content, name) {
  const lang = langOf(name);
  if (lang && window.hljs) {
    try { return hljs.highlight(content, { language: lang }).value; } catch (e) {}
  }
  return esc(content);
}

let active = "chat";
const views = { chat: document.getElementById("chat"), runs: document.getElementById("runs"), status: document.getElementById("status"), cron: document.getElementById("cron"), files: document.getElementById("files") };
const main = document.querySelector("main");

document.querySelectorAll("nav button").forEach(b => {
  b.onclick = () => {
    active = b.dataset.tab;
    document.querySelectorAll("nav button").forEach(x => x.classList.toggle("active", x === b));
    Object.keys(views).forEach(k => views[k].classList.toggle("active", k === active));
    refresh(true);
  };
});

// Shared message renderers (used by chat, subagent transcripts, past sessions).
const bubble = (role, content) => {
  const r = role === "user" ? "user" : role === "assistant" ? "assistant" : "system";
  return `<div class="msg ${r}"><div class="bubble">${esc(content)}</div></div>`;
};

// renderTranscript renders a subagent's lossless event log (tool calls paired
// with results, and messages). Reasoning is intentionally dropped here: thinking
// is a live, ephemeral artifact we don't persist for past conversations, so Runs
// stays consistent by never showing it (the live Chat tab still renders it).
function renderTranscript(evs) {
  const results = {};
  evs.forEach(e => { if (e.kind === "tool_result" && e.call_id) results[e.call_id] = e.output; });
  return evs.map(e => {
    switch (e.kind) {
      // Guard on the TRIMMED text: a tool-only turn emits a whitespace-only
      // assistant message, which would otherwise render as an empty bubble.
      case "user_message": return e.text && e.text.trim() ? bubble("user", e.text.trim()) : "";
      case "assistant_message": return e.text && e.text.trim() ? bubble("assistant", e.text.trim()) : "";
      case "tool_call": return toolBlock(e.tool, e.input, results[e.call_id]);
      default: return ""; // skip reasoning, tokens, usage, lifecycle
    }
  }).join("") || '<div class="empty">no transcript yet</div>';
}

// ---- Chat -----------------------------------------------------------------
function prettyJSON(s) { try { return JSON.stringify(JSON.parse(s), null, 2); } catch (e) { return s || ""; } }

// One collapsible showing a tool call's arguments and its paired result. `key`,
// when given, tags the panel so its open/closed state survives a re-render.
function toolBlock(name, args, result, key) {
  const a = args ? `<div class="tlabel">arguments</div><pre>${esc(prettyJSON(args))}</pre>` : "";
  const r = `<div class="tlabel">result</div><pre>${esc(result) || "(no output)"}</pre>`;
  const k = key ? ` data-k="${esc(key)}"` : "";
  return `<details class="tool"${k}><summary><span class="chev">▸</span><span class="tname">🔧 ${esc(name) || "tool"}</span></summary>${a}${r}</details>`;
}

// Capture/restore which keyed <details> are open, so a re-render of the chat
// view never collapses a panel the user expanded. Keys are stable (tool call
// ids, message indices) so panels keep their open state as new events stream in.
const snapshotOpen = el => { const s = new Set(); el.querySelectorAll("details[data-k]").forEach(d => { if (d.open) s.add(d.dataset.k); }); return s; };
const restoreOpen = (el, set) => el.querySelectorAll("details[data-k]").forEach(d => { if (set.has(d.dataset.k)) d.open = true; });

let chatSig = null;
function renderChat(hist) {
  // Skip DOM work entirely when nothing changed — this is what stops the
  // "scroll jacks me while idle" behavior. The signature folds in the fields
  // we actually render, so streamed tool calls/reasoning trigger a redraw.
  const sig = hist.map(h => `${h.role}:${(h.content||"").length}:${(h.reasoning||"").length}:${(h.tool_calls||[]).length}`).join("|");
  if (sig === chatSig) return;
  const firstRender = chatSig === null;
  chatSig = sig;

  // Only auto-scroll if the user is already pinned to the bottom.
  const pinned = firstRender || (main.scrollHeight - main.scrollTop - main.clientHeight < 80);

  if (!hist.length) { views.chat.innerHTML = '<div class="empty">No messages yet.</div>'; return; }

  // Map each tool result to its call id so we can fold it into the call block.
  const results = {};
  hist.forEach(h => { if (h.role === "tool" && h.tool_call_id) results[h.tool_call_id] = h.content; });

  // Remember which panels are open so streaming a new event never collapses them.
  const open = snapshotOpen(views.chat);

  views.chat.innerHTML = hist.map((h, i) => {
    if (h.role === "tool") return ""; // folded into the assistant's tool call
    let html = "";
    if (h.reasoning) {
      html += `<details class="tool think" data-k="think-${i}"><summary><span class="chev">▸</span><span class="tname">💭 Thinking</span></summary><pre>${esc(h.reasoning)}</pre></details>`;
    }
    const content = (h.content || "").trim();
    if (content) {
      const role = h.role === "user" ? "user" : h.role === "assistant" ? "assistant" : "system";
      html += `<div class="msg ${role}"><div class="bubble">${esc(content)}</div></div>`;
    }
    (h.tool_calls || []).forEach(tc => { html += toolBlock(tc.name, tc.args, results[tc.id], tc.id || `tool-${i}`); });
    return html;
  }).join("");

  restoreOpen(views.chat, open);
  if (pinned) main.scrollTop = main.scrollHeight;
}

// ---- Runs (subagents + past conversations, newest first) ------------------
// One unified list of everything that has run: backgrounded subagents (read
// from their on-disk transcripts) and past chat conversations. Tapping a run
// opens its full transcript/turns on a back-able subpage.
let runSel = null;   // { kind: "sub"|"sess", id } when a run is open
let runsSig = null;
async function renderRuns(force) {
  if (runSel) return; // a subpage is open — leave it untouched until "back"
  const [subs, sess] = await Promise.all([api("/api/subagents"), api("/api/sessions")]);
  const items = [
    ...subs.map(s => ({ kind: "sub", id: s.id, title: s.agent || s.id, badge: s.status || "finished",
                        task: s.task || "(no task)", meta: s.result || s.id, last: s.last_at || s.time || "" })),
    ...sess.map(s => ({ kind: "sess", id: String(s.id), title: "conversation #" + s.id, badge: s.num_msgs + " msgs",
                        task: s.preview || "(no preview)", meta: s.started_at || "", last: s.last_at || "" })),
  ];
  // Sort by last activity (newest response first), not by when each run started.
  // Both sides carry RFC3339 last_at, so a plain string compare orders correctly.
  items.sort((a, b) => (b.last || "").localeCompare(a.last || ""));
  // Idle-safe: only rebuild the list when something actually changed.
  const sig = items.map(i => `${i.kind}${i.id}:${i.badge}:${i.last}`).join("|");
  if (!force && sig === runsSig) return;
  runsSig = sig;
  if (!items.length) { views.runs.innerHTML = '<div class="empty">Nothing has run yet.</div>'; return; }
  const badgeClass = b => /running/.test(b) ? "running" : "finished";
  views.runs.innerHTML = items.map(i => `
    <div class="card run" data-kind="${i.kind}" data-id="${esc(i.id)}">
      <div class="row"><span class="agent">${esc(i.title)}</span><span class="badge ${badgeClass(i.badge)}">${esc(i.badge)}</span></div>
      <div class="task">${esc(i.task)}</div>
      ${i.meta ? `<div class="preview">${esc(i.meta)}</div>` : ""}
    </div>`).join("");
  views.runs.querySelectorAll(".run").forEach(c => c.onclick = () => openRun(c.dataset.kind, c.dataset.id));
}

async function openRun(kind, id) {
  runSel = { kind, id };
  const back = () => { runSel = null; runsSig = null; renderRuns(true); };
  views.runs.innerHTML = `<button class="back">← all runs</button><div class="empty">loading…</div>`;
  views.runs.querySelector(".back").onclick = back;
  try {
    let body;
    if (kind === "sub") {
      body = renderTranscript(await api("/api/subagent?id=" + encodeURIComponent(id)));
    } else {
      const turns = await api("/api/session?id=" + encodeURIComponent(id));
      body = turns.length
        ? turns.map(t => {
            if (t.role === "tool") return `<details class="tool"><summary><span class="chev">▸</span><span class="tname">🔧 ${esc(t.tool_name) || "tool"}</span></summary><pre>${esc(t.content) || "(no output)"}</pre></details>`;
            // Skip empty/whitespace-only turns (a tool-only turn persists an empty
            // assistant row) so they don't render as blank bubbles.
            const c = (t.content || "").trim();
            return c ? bubble(t.role, c) : "";
          }).join("")
        : '<div class="empty">empty conversation</div>';
    }
    views.runs.innerHTML = `<button class="back">← all runs</button>${body}`;
    views.runs.querySelector(".back").onclick = back;
  } catch (e) {
    views.runs.innerHTML = `<button class="back">← all runs</button><div class="err">${esc(e.message)}</div>`;
    views.runs.querySelector(".back").onclick = back;
  }
}

// ---- Status ---------------------------------------------------------------
let statusSig = null;
function renderStatus(st) {
  // Idle-safe: only rebuild when something changed, so an expanded section
  // (e.g. the full system prompt) never collapses under the 4s poll.
  const sig = JSON.stringify(st);
  if (sig === statusSig) return;
  statusSig = sig;
  const chips = arr => (arr || []).map(t => `<span class="chip">${esc(t)}</span>`).join("") || '<span class="chip">none</span>';
  const tools = chips(st.tools);
  const skills = chips(st.skills);
  const subagents = chips(st.subagents);
  const params = (st.params || []).map(p => {
    const val = p.value || p.default || "—";
    const tag = (!p.value && p.default) ? '<span class="def">default</span>' : "";
    return `<div class="param"><span class="pname">${esc(p.name)}</span><span class="pval">${esc(val)}${tag}</span></div>`;
  }).join("");
  const u = st.usage;
  const usage = u ? `
    <div class="section-title">Last turn</div>
    <div class="usage">
      <div class="u"><span class="n">${(u.prompt||0).toLocaleString()}</span><span class="l">prompt</span></div>
      <div class="u"><span class="n">${(u.completion||0).toLocaleString()}</span><span class="l">completion</span></div>
      <div class="u"><span class="n">${(u.total||0).toLocaleString()}</span><span class="l">total</span></div>
    </div>` : "";
  views.status.innerHTML = `
    <dl class="kv">
      <dt>Agent</dt><dd>${esc(st.agent)}</dd>
      <dt>Model</dt><dd>${esc(st.model)}</dd>
      <dt>Context</dt><dd>${(st.context_window || 0).toLocaleString()} tokens</dd>
      <dt>Project</dt><dd>${esc(st.project_ref) || "—"}</dd>
    </dl>
    ${usage}
    <div class="section-title">Tools</div><div class="chips">${tools}</div>
    <div class="section-title">Skills</div><div class="chips">${skills}</div>
    <div class="section-title">Subagents</div><div class="chips">${subagents}</div>
    ${params ? `<div class="section-title">Parameters</div>${params}` : ""}
    ${st.system_prompt ? `<div class="section-title">System prompt</div>
      <details class="tool"><summary><span class="chev">▸</span><span class="tname">📜 Full prompt</span></summary><pre>${esc(st.system_prompt)}</pre></details>` : ""}`;
}

// ---- Cron -----------------------------------------------------------------
// The list shows each job at a glance; tapping one opens a detail subpage with
// its full prompt and run metadata.
let cronSel = null; // job name when a detail subpage is open
async function renderCron() {
  const jobs = await api("/api/cron");
  if (cronSel) {
    const j = jobs.find(x => x.name === cronSel);
    if (j) { cronDetail(j); return; }
    cronSel = null; // job vanished (config reload) — fall back to the list
  }
  views.cron.innerHTML = jobs.length ? jobs.map(j => `
    <div class="card cronjob" data-name="${esc(j.name)}">
      <div class="row"><span class="agent">${esc(j.name)}</span><span class="badge ${j.notify ? "finished" : "running"}">${j.notify ? "notify" : "quiet"}</span></div>
      <div class="task">${esc(j.agent)} · <code>${esc(j.schedule)}</code></div>
      <div class="preview">${j.last_run ? "last run: " + esc(j.last_run) : "not run yet"}</div>
    </div>`).join("") : '<div class="empty">No scheduled jobs.</div>';
  views.cron.querySelectorAll(".cronjob").forEach(c => c.onclick = () => { cronSel = c.dataset.name; renderCron(); });
}

function cronDetail(j) {
  views.cron.innerHTML = `
    <button class="back">← all jobs</button>
    <dl class="kv">
      <dt>Name</dt><dd>${esc(j.name)}</dd>
      <dt>Schedule</dt><dd><code>${esc(j.schedule)}</code></dd>
      <dt>Agent</dt><dd>${esc(j.agent) || "—"}</dd>
      <dt>Work dir</dt><dd>${esc(j.work_dir) || "—"}</dd>
      <dt>Notify</dt><dd>${j.notify ? "yes" : "no"}</dd>
      <dt>Last run</dt><dd>${j.last_run ? esc(j.last_run) : "not run yet"}</dd>
      ${j.last_sub_id ? `<dt>Last run id</dt><dd>${esc(j.last_sub_id)}</dd>` : ""}
    </dl>
    <div class="section-title">Prompt</div>
    <pre class="prompt">${esc(j.prompt) || "(no prompt)"}</pre>`;
  views.cron.querySelector(".back").onclick = () => { cronSel = null; renderCron(); };
}

// ---- Files (read-only explorer of the config folder) ----------------------
// Navigates the directory holding the active shell3.lua. Tapping a folder
// descends; tapping a file opens its contents on a back-able subpage. Secrets
// (.env, ai-do-not-read.*) are listed but their contents are redacted server-side.
let filePath = "";    // current directory, relative to the config root ("" = root)
let fileSel = null;   // relative path of the open file, or null
let filesSig = null;
const fmtSize = n => n < 1024 ? n + " B" : n < 1048576 ? (n / 1024).toFixed(1) + " KB" : (n / 1048576).toFixed(1) + " MB";
const parentDir = p => { const i = p.lastIndexOf("/"); return i < 0 ? "" : p.slice(0, i); };

async function renderFiles(force) {
  if (fileSel !== null) return; // a file is open — leave the subpage untouched
  const data = await api("/api/files?path=" + encodeURIComponent(filePath));
  const sig = filePath + "|" + data.entries.map(e => `${e.name}:${e.dir?1:0}:${e.size}`).join("|");
  if (!force && sig === filesSig) return;
  filesSig = sig;

  const crumb = `<div class="crumb">📁 config root${filePath ? " / " + esc(filePath) : ""}</div>`;
  const up = filePath ? `<div class="card run" data-up="1"><div class="row"><span class="agent">↩︎ ..</span></div></div>` : "";
  const rows = data.entries.map(e => {
    const icon = e.dir ? "📁" : (e.redacted ? "🔒" : "📄");
    const tag = e.dir ? "" : `<span class="badge finished">${e.redacted ? "secret" : fmtSize(e.size)}</span>`;
    return `<div class="card run" data-name="${esc(e.name)}" data-dir="${e.dir ? 1 : 0}">
      <div class="row"><span class="agent">${icon} ${esc(e.name)}</span>${tag}</div></div>`;
  }).join("");
  views.files.innerHTML = crumb + up + (rows || '<div class="empty">empty folder</div>');

  const up0 = views.files.querySelector("[data-up]");
  if (up0) up0.onclick = () => { filePath = parentDir(filePath); filesSig = null; renderFiles(true); };
  views.files.querySelectorAll(".card.run[data-name]").forEach(c => c.onclick = () => {
    const name = c.dataset.name, rel = filePath ? filePath + "/" + name : name;
    if (c.dataset.dir === "1") { filePath = rel; filesSig = null; renderFiles(true); }
    else openFile(rel);
  });
}

async function openFile(rel) {
  fileSel = rel;
  const back = () => { fileSel = null; filesSig = null; renderFiles(true); };
  views.files.innerHTML = `<button class="back">← ${esc(filePath || "config root")}</button><div class="empty">loading…</div>`;
  views.files.querySelector(".back").onclick = back;
  try {
    const f = await api("/api/file?path=" + encodeURIComponent(rel));
    const notes = [];
    if (f.redacted) notes.push("redacted");
    if (f.truncated) notes.push("truncated — first 256 KB");
    if (f.binary) notes.push("binary");
    const note = notes.length ? `<div class="section-title">${esc(notes.join(" · "))}</div>` : "";
    views.files.innerHTML = `<button class="back">← ${esc(filePath || "config root")}</button>
      <div class="crumb">${f.redacted ? "🔒" : "📄"} ${esc(rel)}</div>${note}
      <pre class="prompt"><code>${(f.redacted || f.binary) ? esc(f.content) : (highlight(f.content, rel) || "(empty file)")}</code></pre>`;
    views.files.querySelector(".back").onclick = back;
  } catch (e) {
    views.files.innerHTML = `<button class="back">← back</button><div class="err">${esc(e.message)}</div>`;
    views.files.querySelector(".back").onclick = back;
  }
}

// ---- Poll loop ------------------------------------------------------------
async function refresh(force) {
  try {
    if (active === "chat") renderChat(await api("/api/history"));
    else if (active === "runs") await renderRuns(force);
    else if (active === "status") renderStatus(await api("/api/status"));
    else if (active === "cron" && force) await renderCron();
    else if (active === "files") await renderFiles(force);
  } catch (e) {
    views[active].innerHTML = `<div class="err">⚠️ ${esc(e.message)}<br><small>open from inside Telegram to authenticate</small></div>`;
  }
}
refresh(true);
setInterval(refresh, 4000);
</script>
